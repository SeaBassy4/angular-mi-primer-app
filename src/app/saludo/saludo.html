<div style="border: 2px solid #7702ff; padding: 20px; border-radius: 10px; font-family: sans-serif">
  <h2>{{ mensaje }}</h2>

  <p>write here to change the title:</p>

  <input
    [(ngModel)]="mensaje"
    style="padding: 10px; width: 90%; border: 1px solid #ccc; border-radius: 5px; font-size: 16px"
  />

  <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee" />
</div>
